<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mar Aberto — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c10; --surface: #0d1520; --surface2: #111d2e;
      --border: rgba(255,255,255,0.07); --accent: #00d4aa; --accent2: #0099ff;
      --text: #e8f0f7; --muted: #6b8499; --good: #00d4aa; --ok: #f0b429;
      --bad: #ff6b35; --danger: #ff4d6d;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 2.5rem;
      background: rgba(8,12,16,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.05em; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    .nav-user { font-size: 0.85rem; color: var(--muted); display: none; }
    .nav-user.visible { display: block; }
    .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; display: none; font-family: 'DM Sans', sans-serif; }
    .btn-logout.visible { display: block; }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    .page { padding-top: 80px; min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 80px); padding: 2rem; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 3rem; width: 100%; max-width: 420px; }
    .login-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .login-title span { color: var(--accent); }
    .login-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.5; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input { width: 100%; padding: 0.8rem 1rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; transition: border-color 0.2s; outline: none; }
    .form-group input:focus { border-color: var(--accent); }
    .btn-primary { width: 100%; padding: 0.9rem; background: var(--accent); color: #000; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s; margin-top: 0.5rem; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); color: var(--danger); border-radius: 8px; padding: 0.8rem 1rem; font-size: 0.875rem; margin-top: 1rem; display: none; }
    .login-error.visible { display: block; }
    .login-info { background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.2); border-radius: 8px; padding: 0.8rem 1rem; font-size: 0.85rem; color: var(--accent); margin-bottom: 1.5rem; display: none; line-height: 1.5; }
    .login-info.visible { display: block; }
    .login-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--muted); }
    .login-footer a { color: var(--accent); text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }
    .btn-back { background: transparent; border: none; color: var(--muted); font-size: 0.85rem; cursor: pointer; padding: 0; margin-bottom: 1.5rem; font-family: 'DM Sans', sans-serif; display: none; }
    .btn-back.visible { display: block; }
    .btn-back:hover { color: var(--text); }

    /* código input grande */
    #inp-code { font-size: 2rem; text-align: center; letter-spacing: 0.5rem; font-weight: 500; }

    /* ── DASHBOARD ── */
    #dashboard-screen { display: none; padding: 2rem 2.5rem 4rem; }
    #dashboard-screen.visible { display: block; }
    .dash-header { margin-bottom: 2.5rem; }
    .dash-greeting { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.05em; line-height: 1; }
    .dash-greeting span { color: var(--accent); }
    .dash-sub { color: var(--muted); font-size: 0.9rem; margin-top: 0.4rem; }
    .beach-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .beach-tab { padding: 0.5rem 1.2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; color: var(--muted); font-size: 0.85rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .beach-tab:hover { border-color: var(--accent); color: var(--text); }
    .beach-tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }
    .beach-tab.locked { opacity: 0.4; cursor: not-allowed; }
    .beach-tab.locked::after { content: ' 🔒'; }
    .rating-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.9rem; font-weight: 500; margin-bottom: 2rem; }
    .rating-excelente { background: rgba(0,212,170,0.15); color: var(--good); border: 1px solid rgba(0,212,170,0.3); }
    .rating-bom       { background: rgba(0,153,255,0.15); color: var(--accent2); border: 1px solid rgba(0,153,255,0.3); }
    .rating-regular   { background: rgba(240,180,41,0.15); color: var(--ok); border: 1px solid rgba(240,180,41,0.3); }
    .rating-fraco     { background: rgba(255,107,53,0.15); color: var(--bad); border: 1px solid rgba(255,107,53,0.3); }
    .rating-pessimo   { background: rgba(255,77,109,0.15); color: var(--danger); border: 1px solid rgba(255,77,109,0.3); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem 1.4rem; }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .stat-value { font-size: 1.8rem; font-weight: 500; line-height: 1; margin-bottom: 0.2rem; }
    .stat-unit { font-size: 0.8rem; color: var(--muted); }
    .stat-sub  { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
    .chart-title { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.2rem; }
    .chart-wrap { position: relative; height: 180px; }
    .week-title { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
    .week-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
    .week-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.2rem; cursor: pointer; transition: border-color 0.2s; }
    .week-card:hover { border-color: rgba(255,255,255,0.15); }
    .week-card.active { border-color: var(--accent); }
    .week-day { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .week-rating { font-size: 1.1rem; margin-bottom: 0.4rem; }
    .week-stats { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }
    .loading { display: flex; align-items: center; justify-content: center; gap: 0.75rem; color: var(--muted); font-size: 0.9rem; padding: 3rem 0; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .premium-banner { background: linear-gradient(135deg, rgba(0,212,170,0.08), rgba(0,153,255,0.08)); border: 1px solid rgba(0,212,170,0.2); border-radius: 12px; padding: 2rem; text-align: center; margin-bottom: 2rem; }
    .premium-banner h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .premium-banner p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }
    .btn-premium { display: inline-block; padding: 0.7rem 1.5rem; background: var(--accent); color: #000; border-radius: 8px; font-weight: 500; text-decoration: none; font-size: 0.9rem; transition: opacity 0.2s; }
    .btn-premium:hover { opacity: 0.85; }
    @media (max-width: 600px) {
      nav { padding: 1rem 1.2rem; }
      #dashboard-screen { padding: 1.5rem 1.2rem 3rem; }
      .login-card { padding: 2rem 1.5rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">〜 MAR <span>ABERTO</span></a>
  <div class="nav-right">
    <span class="nav-user" id="nav-user"></span>
    <button class="btn-logout" id="btn-logout" onclick="logout()">Sair</button>
  </div>
</nav>

<div class="page">

  <!-- ── LOGIN ── -->
  <div id="login-screen">
    <div class="login-card">

      <!-- Etapa 1: Email -->
      <div id="step-email">
        <div class="login-title">ENTRAR NO <span>DASHBOARD</span></div>
        <div class="login-sub">Digite seu e-mail cadastrado. Vamos enviar um código pelo Telegram.</div>
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="inp-email" placeholder="seu@email.com"
            onkeydown="if(event.key==='Enter') requestCode()" />
        </div>
        <button class="btn-primary" id="btn-request" onclick="requestCode()">
          Enviar código →
        </button>
        <div class="login-error" id="error-email"></div>
        <div class="login-footer">
          Ainda não tem conta? <a href="/#cadastro">Cadastre-se grátis</a>
        </div>
      </div>

      <!-- Etapa 2: Código -->
      <div id="step-code" style="display:none">
        <button class="btn-back visible" onclick="backToEmail()">← Voltar</button>
        <div class="login-title">CÓDIGO <span>ENVIADO</span></div>
        <div class="login-info visible" id="code-info">
          📱 Enviamos um código de 6 dígitos para o seu Telegram. Válido por 10 minutos.
        </div>
        <div class="form-group">
          <label>Código</label>
          <input type="text" id="inp-code" placeholder="000000" maxlength="6"
            inputmode="numeric" onkeydown="if(event.key==='Enter') verifyCode()" />
        </div>
        <button class="btn-primary" id="btn-verify" onclick="verifyCode()">
          Entrar →
        </button>
        <div class="login-error" id="error-code"></div>
        <div class="login-footer" style="margin-top:1.5rem">
          Não recebeu? <a href="#" onclick="requestCode(); return false;">Reenviar código</a>
        </div>
      </div>

    </div>
  </div>

  <!-- ── DASHBOARD ── -->
  <div id="dashboard-screen">
    <div class="dash-header">
      <div class="dash-greeting">OLÁ, <span id="dash-name">SURFISTA</span>!</div>
      <div class="dash-sub" id="dash-date"></div>
    </div>
    <div class="beach-tabs" id="beach-tabs"></div>
    <div id="forecast-content">
      <div class="loading"><div class="spinner"></div> Buscando condições...</div>
    </div>
  </div>

</div>

<script>
const BEACH_NAMES = {
  copacabana:'Copacabana', ipanema:'Ipanema', leblon:'Leblon',
  sao_conrado:'São Conrado', barra:'Barra da Tijuca', recreio:'Recreio',
  macumba:'Macumba', prainha:'Prainha', grumari:'Grumari',
  joaquina:'Joaquina', praia_mole:'Praia Mole', barra_da_lagoa:'Barra da Lagoa',
  campeche:'Campeche', itamambuca:'Itamambuca', prumirim:'Prumirim', maresias:'Maresias',
};

const state = { user: null, token: null, activeBeach: null, cache: {} };
const fmt   = (v, d=1) => (v==null||isNaN(v)) ? '—' : Number(v).toFixed(d);
const dir   = deg => deg==null ? '—' : ['N','NE','L','SE','S','SO','O','NO'][Math.round(deg/45)%8];

// ── INIT ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('ma_session');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      if (s.token && s.user) { state.token = s.token; state.user = s.user; showDashboard(); return; }
    } catch {}
  }
  showLogin();
});

// ── LOGIN ETAPA 1: pede código ───────────────────────────────────────────────
async function requestCode() {
  const email = document.getElementById('inp-email').value.trim();
  const errEl = document.getElementById('error-email');
  const btn   = document.getElementById('btn-request');
  errEl.classList.remove('visible');

  if (!email || !email.includes('@')) { showErr(errEl, 'Informe um e-mail válido.'); return; }

  btn.disabled = true; btn.textContent = 'Enviando...';

  try {
    const res  = await fetch('/api/auth/request-code', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();

    if (!res.ok) {
      if (data.needsBot) {
        showErr(errEl, '⚠️ ' + data.error);
      } else {
        showErr(errEl, data.error || 'Erro ao enviar código.');
      }
      return;
    }

    // Vai para etapa 2
    document.getElementById('step-email').style.display = 'none';
    document.getElementById('step-code').style.display  = 'block';
    setTimeout(() => document.getElementById('inp-code').focus(), 100);

  } catch { showErr(errEl, 'Erro de conexão. Tente novamente.'); }
  finally  { btn.disabled = false; btn.textContent = 'Enviar código →'; }
}

function backToEmail() {
  document.getElementById('step-code').style.display  = 'none';
  document.getElementById('step-email').style.display = 'block';
  document.getElementById('error-code').classList.remove('visible');
  document.getElementById('inp-code').value = '';
}

// ── LOGIN ETAPA 2: verifica código ───────────────────────────────────────────
async function verifyCode() {
  const email = document.getElementById('inp-email').value.trim();
  const code  = document.getElementById('inp-code').value.trim();
  const errEl = document.getElementById('error-code');
  const btn   = document.getElementById('btn-verify');
  errEl.classList.remove('visible');

  if (!code || code.length !== 6) { showErr(errEl, 'Digite o código de 6 dígitos.'); return; }

  btn.disabled = true; btn.textContent = 'Verificando...';

  try {
    const res  = await fetch('/api/auth/verify-code', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, code }),
    });
    const data = await res.json();

    if (!res.ok) { showErr(errEl, data.error || 'Código inválido.'); return; }

    state.token = data.token;
    state.user  = data.user;
    localStorage.setItem('ma_session', JSON.stringify({ token: state.token, user: state.user }));
    showDashboard();

  } catch { showErr(errEl, 'Erro de conexão. Tente novamente.'); }
  finally  { btn.disabled = false; btn.textContent = 'Entrar →'; }
}

function showErr(el, msg) { el.textContent = msg; el.classList.add('visible'); }

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-screen').style.display    = 'flex';
  document.getElementById('dashboard-screen').classList.remove('visible');
}

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard-screen').classList.add('visible');
  document.getElementById('dash-name').textContent = (state.user.firstName || 'SURFISTA').toUpperCase();
  document.getElementById('nav-user').textContent = state.user.email;
  document.getElementById('nav-user').classList.add('visible');
  document.getElementById('btn-logout').classList.add('visible');
  document.getElementById('dash-date').textContent = new Date().toLocaleDateString('pt-BR', {
    weekday:'long', day:'numeric', month:'long', timeZone:'America/Sao_Paulo'
  });
  renderTabs();
}

function renderTabs() {
  const container   = document.getElementById('beach-tabs');
  const beaches     = state.user.beaches || [];
  const isPremium   = state.user.isPremium;
  const accessible  = isPremium ? beaches : beaches.slice(0, 1);
  const locked      = isPremium ? [] : beaches.slice(1);

  container.innerHTML = [
    ...accessible.map(id => `
      <button class="beach-tab ${id === state.activeBeach ? 'active' : ''}"
        onclick="selectBeach('${id}')">
        ${BEACH_NAMES[id] || id}
      </button>`),
    ...locked.map(id => `
      <button class="beach-tab locked" title="Premium necessário">
        ${BEACH_NAMES[id] || id}
      </button>`),
  ].join('');

  if (!state.activeBeach) selectBeach(accessible[0]);
}

async function selectBeach(beachId) {
  if (!beachId) return;
  state.activeBeach = beachId;
  renderTabs();

  const content = document.getElementById('forecast-content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div> Buscando condições...</div>';

  try {
    let data = state.cache[beachId];
    if (!data) {
      const res = await fetch(`/api/forecast?beach=${beachId}&days=7`, {
        headers: { 'Authorization': `Bearer ${state.token}` },
      });
      if (res.status === 401) { logout(); return; }
      if (!res.ok) throw new Error();
      data = await res.json();
      state.cache[beachId] = data;
    }
    renderForecast(data);
  } catch {
    content.innerHTML = '<p style="color:var(--muted);padding:2rem 0">Erro ao buscar dados. Tente novamente.</p>';
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderForecast(data) {
  const content = document.getElementById('forecast-content');
  const today   = data.daily[0];
  if (!today) { content.innerHTML = '<p style="color:var(--muted)">Sem dados.</p>'; return; }

  const r = getRating(today, data.beach);
  const rClass = 'rating-' + r.label.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  content.innerHTML = `
    <div class="rating-badge ${rClass}">${r.emoji} ${r.label} hoje</div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Ondas</div>
        <div class="stat-value">${fmt(today.waveHeight?.avg)}</div>
        <div class="stat-unit">metros</div>
        <div class="stat-sub">pico ${fmt(today.waveHeight?.max)}m</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Período</div>
        <div class="stat-value">${fmt(today.wavePeriod?.avg)}</div>
        <div class="stat-unit">segundos</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Swell</div>
        <div class="stat-value">${fmt(today.swellHeight?.avg)}</div>
        <div class="stat-unit">metros · ${fmt(today.swellPeriod?.avg)}s</div>
        <div class="stat-sub">Dir: ${dir(today.swellDirection)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Vento</div>
        <div class="stat-value">${fmt(today.windSpeed?.avg)}</div>
        <div class="stat-unit">km/h · ${dir(today.windDirection)}</div>
        <div class="stat-sub">rajadas ${fmt(today.windGusts?.max)}km/h</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Chuva</div>
        <div class="stat-value">${fmt(today.precipitation)}</div>
        <div class="stat-unit">mm</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Temp. água</div>
        <div class="stat-value">${fmt(today.seaTemp)}</div>
        <div class="stat-unit">°C · ar ${fmt(today.airTemp)}°C</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Altura das ondas — hoje (6h–18h)</div>
      <div class="chart-wrap"><canvas id="wave-chart"></canvas></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Vento — hoje (6h–18h)</div>
      <div class="chart-wrap"><canvas id="wind-chart"></canvas></div>
    </div>

    ${!state.user.isPremium && (state.user.beaches?.length > 1) ? `
    <div class="premium-banner">
      <h3>🔒 ACESSO PREMIUM</h3>
      <p>Você tem ${state.user.beaches.length} praias salvas. Desbloqueie todas por R$5/mês via PIX.</p>
      <a href="https://t.me/maraberto_bot?start=premium" class="btn-premium" target="_blank">Assinar Premium →</a>
    </div>` : ''}

    <div class="week-title">Previsão da semana</div>
    <div class="week-grid">
      ${data.daily.map((day, i) => {
        const dr = getRating(day, data.beach);
        return `<div class="week-card ${i===0?'active':''}" onclick="selectDay(this, ${i}, ${JSON.stringify(data).replace(/</g,'\\u003c')})">
          <div class="week-day">${day.label}</div>
          <div class="week-rating">${dr.emoji} ${dr.label}</div>
          <div class="week-stats">🌊 ${fmt(day.waveHeight?.avg)}m · ${fmt(day.wavePeriod?.avg)}s<br>💨 ${fmt(day.windSpeed?.avg)}km/h ${dir(day.windDirection)}</div>
        </div>`;
      }).join('')}
    </div>
  `;

  renderChart(today.hourly || []);
}

function selectDay(el, index, data) {
  document.querySelectorAll('.week-card').forEach((c,i) => c.classList.toggle('active', i===index));
  const day = data.daily[index];
  if (!day) return;
  const r = getRating(day, data.beach);
  const rClass = 'rating-' + r.label.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  document.querySelector('.rating-badge').className = `rating-badge ${rClass}`;
  document.querySelector('.rating-badge').textContent = `${r.emoji} ${r.label} — ${day.label}`;
}

function renderChart(hourly) {
  const canvas = document.getElementById('wave-chart');
  if (canvas && hourly.length) {
    new Chart(canvas, {
      type: 'line',
      data: {
        labels: hourly.map(h => h.time.slice(11,16)),
        datasets: [{
          label: 'Ondas (m)',
          data: hourly.map(h => h.waveHeight),
          borderColor: '#00d4aa',
          backgroundColor: 'rgba(0,212,170,0.08)',
          tension: 0.4, fill: true, pointRadius: 3,
          pointBackgroundColor: '#00d4aa',
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#6b8499', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
          y: {
            ticks: { color: '#6b8499', font: { size: 11 } },
            grid: { color: 'rgba(255,255,255,0.04)' }, min: 0,
            title: { display: true, text: 'm', color: '#6b8499', font: { size: 11 } },

        },

  const windCanvas = document.getElementById('wind-chart');

      type: 'line',

            data: hourly.map(h => h.windSpeed),

          {

            data: hourly.map(h => h.windGusts),

      },

            display: true,

        },

          x: { ticks: { color: '#6b8499', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } },

            title: { display: true, text: 'km/h', color: '#6b8499', font: { size: 11 } },
          },
        },
      },
    });
  }
}

// ── RATING (espelho do telegram.js) ──────────────────────────────────────────
function dirToDegs(d) { return {N:0,NE:45,L:90,SE:135,S:180,SO:225,O:270,NO:315}[d]??null; }
function swellScore(swellDeg, facing, period=0) {
  if (swellDeg==null||!facing) return 1;
  const fd=dirToDegs(facing); if(fd==null) return 1;
  let diff=Math.abs(swellDeg-fd); if(diff>180) diff=360-diff;
  let s=diff<=22.5?3:diff<=45?2:diff<=67.5?1:diff<=90?0:-1;
  if(s===3&&period<12) s=2; return s;
}
function windScore(speed, wDeg, facing) {
  if(wDeg==null||!facing){ return speed<10?2:speed<20?1:speed<30?0:speed>=40?-2:-1; }
  const fd=dirToDegs(facing); if(fd==null) return speed<10?2:speed<20?1:0;
  let diff=Math.abs(wDeg-fd); if(diff>180) diff=360-diff;
  if(diff>=135) return speed<10?3:speed<20?2:speed<30?1:0;
  if(diff<=45)  return speed<10?0:speed<20?-1:speed<30?-2:-3;
  return speed<15?1:speed<25?0:speed<35?-1:-2;
}
function getRating(day, beach) {
  const waveH=day.waveHeight?.avg||0, period=day.wavePeriod?.avg||0;
  const wind=day.windSpeed?.avg||0, windDir=day.windDirection??null;
  const rain=day.precipitation||0, swellDir=day.swellDirection??null;
  const swellP=day.swellPeriod?.avg||0;
  let s=0;
  if(waveH>=0.8&&waveH<=2.5) s+=3; else if(waveH>=0.5) s+=1; else if(waveH>2.5&&waveH<=4) s+=2; else if(waveH>4) s-=1;
  s+=period>=14?3:period>=12?2:period>=9?1:0;
  s+=swellScore(swellDir,beach?.facing,swellP);
  s+=windScore(wind,windDir,beach?.facing);
  if(rain>10) s-=3; else if(rain>5) s-=2; else if(rain>1) s-=1;
  const big=waveH>2.5;
  if(!big&&s>=11) return {emoji:'🔥',label:'Excelente'};
  if(s>=8)        return {emoji:'✅',label:'Bom'};
  if(s>=4)        return {emoji:'😐',label:'Regular'};
  if(s>=2)        return {emoji:'😞',label:'Fraco'};
  return          {emoji:'⛔',label:'Péssimo'};
}

// ── LOGOUT ───────────────────────────────────────────────────────────────────
function logout() {
  localStorage.removeItem('ma_session');
  Object.assign(state, {user:null,token:null,activeBeach:null,cache:{}});
  document.getElementById('nav-user').classList.remove('visible');
  document.getElementById('btn-logout').classList.remove('visible');
  document.getElementById('inp-email').value='';
  document.getElementById('inp-code').value='';
  document.getElementById('step-code').style.display='none';
  document.getElementById('step-email').style.display='block';
  document.getElementById('error-email').classList.remove('visible');
  document.getElementById('error-code').classList.remove('visible');
  showLogin();
}
